spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-postgis:5432/agristack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Hibernate 6 auto-detects the PostgreSQL dialect — no need to set it explicitly
spring.jpa.hibernate.ddl-auto=update

# Enable initialization via data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Suppress open-in-view WARN (we use explicit transactions, not lazy loading in views)
spring.jpa.open-in-view=false
