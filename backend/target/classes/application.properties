spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/terranode}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:terranode_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:terranode_password}

# Hibernate 6 auto-detects the PostgreSQL dialect — no need to set it explicitly
spring.jpa.hibernate.ddl-auto=update

# Enable initialization via data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Suppress open-in-view WARN (we use explicit transactions, not lazy loading in views)
spring.jpa.open-in-view=false

gemini.api.key=${GEMINI_API_KEY:test-key-for-dev}