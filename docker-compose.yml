services:
  # ==============================================================================
  # BASE LAYER: The Cryptographic Data Vault
  # Requires PostGIS natively mapped for precise Topology Intersections (JTS)
  # ==============================================================================
  postgres-postgis:
    image: postgis/postgis:16-3.4
    container_name: terranode-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agristack
    ports:
      - "5432:5432"
    volumes:
      - terranode_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agristack"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==============================================================================
  # DEEPTECH LAYER: Multi-Sensor ML Engine
  # Isolated Python runtime to compute Sentinel-1/Sentinel-2 SAR Matrix securely
  # ==============================================================================
  microservice:
    build:
      context: ./microservice
      dockerfile: Dockerfile.dev
    container_name: terranode-microservice
    working_dir: /app
    volumes:
      - ./microservice:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==============================================================================
  # MIDDLEWARE GATEWAY: Zero-Knowledge & AES-GCM Orchestrator
  # The strict Java Spring Boot JVM shielding interactions natively
  # ==============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: terranode-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - terranode_m2:/root/.m2    # Caches Maven dependencies for rapid restarts
      - terranode_keys:/app/keys  # Persists RSA keypair across container restarts
    ports:
      - "8080:8080"
    environment:
      # Injecting the Docker network DNS exactly overriding localhost
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-postgis:5432/agristack
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      # SMTP Email Gateway
      - SPRING_MAIL_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SPRING_MAIL_PORT=${SMTP_PORT:-587}
      - SPRING_MAIL_USERNAME=${SMTP_USER:-}
      - SPRING_MAIL_PASSWORD=${SMTP_PASS:-}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      # Google Gemini Vision API Key for Fraud Detection
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/crypto/public-key >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    depends_on:
      postgres-postgis:
        condition: service_healthy
    command: mvn spring-boot:run

  # ==============================================================================
  # EXPERIENCE LAYER: Minimal Judge-Facing Frontend
  # Next.js React PWA mapped to the secure claim flow
  # ==============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: terranode-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume preserves the Docker-built dependencies
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    command: >
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  terranode_pgdata:
    driver: local
  terranode_m2:
    driver: local
  terranode_keys:
    driver: local
